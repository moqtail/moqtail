name: Relay Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'relay@*'
    paths:
      - 'apps/relay/**'
      - 'libs/moqtail-rs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/relay.yml'
  create:
  workflow_dispatch:

concurrency:
  group: relay-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/moqtail/relay

jobs:
  publish:
    name: Build and Publish Relay Image
    if: ${{ github.repository == 'moqtail/moqtail' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=match,pattern=^relay@(.*)$,group=1,enable=${{ startsWith(github.ref, 'refs/tags/relay@') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/relay@') }}
          labels: |
            org.opencontainers.image.title=relay
            org.opencontainers.image.description=Draft 16-compliant MOQtail relay container image
            org.opencontainers.image.url=https://github.com/moqtail/moqtail
            org.opencontainers.image.source=https://github.com/moqtail/moqtail

      - name: Build and push relay image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/relay/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
