name: Meet

on:
  push:
    branches:
      - main
    paths:
      - apps/meet/**
      - libs/moqtail-ts/**
      - .github/workflows/meet.yml

permissions:
  contents: read
  deployments: write

concurrency:
  group: 'meet-page'
  cancel-in-progress: true

jobs:
  meet:
    if: ${{ github.repository_owner == 'moqtail' }}
    runs-on: ubuntu-latest
    environment:
      name: cloudflare
      url: 'https://meet.moqtail.dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          node-version: lts/*

      - run: npm clean-install
      - run: corepack enable
      - run: npm audit signatures

      - name: Get build information
        run: |
          commit=$(git rev-parse --short HEAD)
          date=$(date +'%Y-%m-%d')
          echo "VITE_BUILD_COMMIT=$commit" >> $GITHUB_ENV
          echo "VITE_BUILD_DATE=$date" >> $GITHUB_ENV

      - name: Build MOQtail Library and Meet
        run: npm run build

      - name: Update app settings
        working-directory: apps/meet/dist
        run: |
          sed -i "s|relayUrl:.*|relayUrl: 'https://relay.n1.fra.moqtail.dev',|g" appsettings.js

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --name meet --assets apps/meet/dist --compatibility-date 2026-07-13
