name: Player

on:
  push:
    branches:
      - draft-16
    paths:
      - apps/client-js/**
      - libs/moqtail-ts/**
      - .github/workflows/player.yml
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: 'player-page'
  cancel-in-progress: true

jobs:
  player:
    if: ${{ github.repository_owner == 'moqtail' }}
    runs-on: ubuntu-latest
    environment:
      name: cloudflare
      url: 'https://player.moqtail.dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          node-version: lts/*

      - run: npm clean-install
      - run: corepack enable
      - run: npm audit signatures

      - name: Get build information
        run: |
          commit=$(git rev-parse --short HEAD)
          date=$(date +'%Y-%m-%d')
          echo "VITE_BUILD_COMMIT=$commit" >> $GITHUB_ENV
          echo "VITE_BUILD_DATE=$date" >> $GITHUB_ENV

      - name: Build MOQtail Library and Player
        run: npm run build

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --name player --assets apps/client-js/dist --compatibility-date 2026-07-13
