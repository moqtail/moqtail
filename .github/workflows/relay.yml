name: Relay Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'relay@*'

concurrency:
  group: relay-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/moqtail/relay

jobs:
  publish:
    name: Build and Publish Relay Image
    if: ${{ github.repository == 'moqtail/moqtail' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=match,pattern=^relay@(.*)$,group=1,enable=${{ startsWith(github.ref, 'refs/tags/relay@') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/relay@') }}
          labels: |
            org.opencontainers.image.title=relay
            org.opencontainers.image.description=Draft 14-compliant MOQtail relay container image
            org.opencontainers.image.url=https://github.com/moqtail/moqtail
            org.opencontainers.image.source=https://github.com/moqtail/moqtail

      - name: Build and push relay image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/relay/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
